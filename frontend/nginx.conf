server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Proxy alle /api/* requests naar de API container
    # Let op: proxy_pass ZONDER trailing slash → behoudt volledig pad
    location /api/ {
        proxy_pass         http://homedash-api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 15s;
        proxy_send_timeout 15s;

        # Nodig voor POST requests met body
        proxy_set_header   Content-Type $content_type;
        proxy_pass_request_headers on;
        proxy_pass_request_body    on;

        add_header Access-Control-Allow-Origin  * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
    }

    location /health {
        proxy_pass         http://homedash-api:3001/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
